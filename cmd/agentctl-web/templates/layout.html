<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}agentctl{{end}} | Clawdlinux</title>
    <link rel="stylesheet" href="/theme/clawdlinux-theme.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
    <meta name="csrf-token" content="{{.CSRFToken}}">
</head>
<body>
    {{if .Demo}}
    <nav class="navbar demo-navbar">
        <a class="nav-brand" href="/demo" aria-label="Clawdlinux evidence console">
            <img class="brand-wordmark" src="/theme/clawdlinux-wordmark.svg" alt="Clawdlinux">
        </a>
        <div class="demo-nav-proof">
            <span class="demo-pill">Evidence boundaries</span>
            <span class="demo-pill">Cluster readback</span>
            <span class="demo-pill">Offline verification</span>
        </div>
    </nav>
    {{else}}
    <nav class="navbar">
        <a class="nav-brand" href="/" aria-label="Clawdlinux agentctl dashboard">
            <img class="brand-wordmark" src="/theme/clawdlinux-wordmark.svg" alt="Clawdlinux">
            <span class="product-name">agentctl</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link" hx-get="/" hx-target="body" hx-push-url="true">Dashboard</a>
            <a href="/workloads" class="nav-link">Workloads</a>
            <a href="/cost" class="nav-link">Cost</a>
            <a href="/status" class="nav-link">Status</a>
        </div>
        <div class="nav-user">
            {{if .User}}
            <span class="username">{{.User.Username}}</span>
            <form method="POST" action="/auth/logout" style="display:inline">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <button type="submit" class="btn btn-sm btn-secondary">Logout</button>
            </form>
            {{end}}
        </div>
    </nav>
    {{end}}
    <main class="container"{{if .Demo}} hx-get="/demo" hx-trigger="every 5s" hx-target="body" hx-swap="outerHTML"{{end}}>
        {{block "content" .}}{{end}}
    </main>
    <footer class="footer">
        <span>Clawdlinux</span>
    </footer>
</body>
</html>
