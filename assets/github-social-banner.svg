<svg viewBox="0 0 1280 640" width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="banner-clip"><rect width="1280" height="640" rx="0"/></clipPath>
  </defs>
  <g clip-path="url(#banner-clip)">
    <!-- Background -->
    <rect width="1280" height="640" fill="#0F1B3D"/>
    <!-- Subtle grid -->
    <g stroke="#1E2761" stroke-width="1" opacity="0.6">
      <line x1="0" y1="80" x2="1280" y2="80"/>
      <line x1="0" y1="160" x2="1280" y2="160"/>
      <line x1="0" y1="240" x2="1280" y2="240"/>
      <line x1="0" y1="320" x2="1280" y2="320"/>
      <line x1="0" y1="400" x2="1280" y2="400"/>
      <line x1="0" y1="480" x2="1280" y2="480"/>
      <line x1="0" y1="560" x2="1280" y2="560"/>
      <line x1="160" y1="0" x2="160" y2="640"/>
      <line x1="320" y1="0" x2="320" y2="640"/>
      <line x1="480" y1="0" x2="480" y2="640"/>
      <line x1="640" y1="0" x2="640" y2="640"/>
      <line x1="800" y1="0" x2="800" y2="640"/>
      <line x1="960" y1="0" x2="960" y2="640"/>
      <line x1="1120" y1="0" x2="1120" y2="640"/>
    </g>
    <!-- Decorative mesh nodes background -->
    <g opacity="0.15">
      <circle cx="160" cy="160" r="3" fill="#3B82F6"/>
      <circle cx="320" cy="80" r="2" fill="#60A5FA"/>
      <circle cx="480" cy="240" r="2.5" fill="#3B82F6"/>
      <circle cx="960" cy="160" r="3" fill="#3B82F6"/>
      <circle cx="1120" cy="80" r="2" fill="#60A5FA"/>
      <circle cx="800" cy="480" r="2.5" fill="#3B82F6"/>
      <circle cx="960" cy="560" r="2" fill="#60A5FA"/>
      <circle cx="1120" cy="480" r="3" fill="#3B82F6"/>
      <circle cx="160" cy="480" r="2" fill="#60A5FA"/>
      <circle cx="320" cy="560" r="2.5" fill="#3B82F6"/>
      <line x1="160" y1="160" x2="320" y2="80" stroke="#3B82F6" stroke-width="1"/>
      <line x1="320" y1="80" x2="480" y2="240" stroke="#3B82F6" stroke-width="1"/>
      <line x1="960" y1="160" x2="1120" y2="80" stroke="#3B82F6" stroke-width="1"/>
      <line x1="800" y1="480" x2="960" y2="560" stroke="#3B82F6" stroke-width="1"/>
      <line x1="960" y1="560" x2="1120" y2="480" stroke="#3B82F6" stroke-width="1"/>
      <line x1="160" y1="480" x2="320" y2="560" stroke="#3B82F6" stroke-width="1"/>
    </g>

    <!-- ClawdLinux logo mark -->
    <g transform="translate(220, 320) scale(1.3)">
      <path d="M-8,-55 C-8,-55 -30,-30 -40,0 C-50,30 -35,55 -10,55 C5,55 15,45 20,35 C25,25 30,10 25,-5 C20,-20 10,-35 5,-45 C2,-50 -2,-55 -8,-55Z" fill="#CADCFC" opacity="0.9"/>
      <path d="M12,-50 C12,-50 35,-25 42,5 C48,30 35,52 15,55 C5,56 -2,50 -5,42" fill="none" stroke="#CADCFC" stroke-width="3" opacity="0.5"/>
      <path d="M-25,-15 L15,25" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
      <path d="M-15,-20 L22,15" stroke="#3B82F6" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
      <path d="M-5,-25 L28,5" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
      <circle cx="30" cy="-35" r="4" fill="#60A5FA"/>
      <circle cx="35" cy="-28" r="2.5" fill="#3B82F6"/>
      <circle cx="25" cy="-42" r="1.8" fill="#93C5FD"/>
      <path d="M28,-37 L38,-45" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M32,-30 L42,-25" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round"/>
    </g>

    <!-- NineVigil product mark (smaller, right side) -->
    <g transform="translate(1060, 320) scale(0.7)">
      <path d="M0,-65 L40,-40 L50,5 L35,45 L0,60 L-35,45 L-50,5 L-40,-40 Z" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.25"/>
      <line x1="-40" y1="-40" x2="40" y2="-40" stroke="#3B82F6" stroke-width="1" opacity="0.15"/>
      <line x1="50" y1="5" x2="-50" y2="5" stroke="#3B82F6" stroke-width="1" opacity="0.15"/>
      <text x="-2" y="18" font-family="Arial Black, Arial" font-weight="900" font-size="90" fill="#CADCFC" opacity="0.5" text-anchor="middle">9</text>
      <circle cx="0" cy="-65" r="4" fill="#60A5FA" opacity="0.5"/>
      <circle cx="40" cy="-40" r="3" fill="#3B82F6" opacity="0.4"/>
      <circle cx="50" cy="5" r="3" fill="#3B82F6" opacity="0.4"/>
      <circle cx="35" cy="45" r="3" fill="#3B82F6" opacity="0.4"/>
      <circle cx="0" cy="60" r="4" fill="#60A5FA" opacity="0.5"/>
      <circle cx="-35" cy="45" r="3" fill="#3B82F6" opacity="0.4"/>
      <circle cx="-50" cy="5" r="3" fill="#3B82F6" opacity="0.4"/>
      <circle cx="-40" cy="-40" r="3" fill="#3B82F6" opacity="0.4"/>
    </g>

    <!-- Text -->
    <text x="420" y="260" font-family="Arial Black, Arial" font-weight="900" font-size="72" fill="#FFFFFF" letter-spacing="-1">NineVigil</text>
    <text x="420" y="330" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#60A5FA" letter-spacing="1">The Agentic Service Mesh</text>
    <text x="420" y="370" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#94A3B8">for Enterprise Kubernetes</text>

    <!-- Bottom bar -->
    <rect x="420" y="420" width="60" height="3" rx="1.5" fill="#3B82F6"/>
    <text x="420" y="470" font-family="monospace" font-size="18" fill="#10B981">$ agentctl init</text>
    <text x="420" y="500" font-family="monospace" font-size="16" fill="#94A3B8">Multi-agent orchestration | RL feedback | Air-gapped</text>

    <!-- Bottom links -->
    <text x="420" y="570" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#CADCFC" font-weight="bold">clawdlinux.org</text>
    <text x="620" y="570" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#64748B">|</text>
    <text x="650" y="570" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#CADCFC" font-weight="bold">github.com/clawdlinux/</text>
  </g>
</svg>
