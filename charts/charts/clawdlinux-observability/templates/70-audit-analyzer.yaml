{{- if .Values.auditAnalyzer.enabled }}
{{- /* Production-tier analyzer. Disabled by default in OSS. */ -}}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "clawd-observability.fullname" . }}-audit-analyzer
  namespace: {{ include "clawd-observability.namespace" . }}
  labels:
    {{- include "clawd-observability.componentLabels" (merge (dict "component" "audit-analyzer") .) | nindent 4 }}
    clawd.tier: production
spec:
  schedule: {{ .Values.auditAnalyzer.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: audit-analyzer
        spec:
          restartPolicy: OnFailure
          containers:
            - name: analyzer
              image: {{ include "clawd-observability.image" (dict "image" .Values.auditAnalyzer.image "root" .) }}
              args: ["once"]
              env:
                - name: CLICKHOUSE_HOST
                  value: {{ include "clawd-observability.clickhouse.host" . }}
                - name: CLICKHOUSE_PORT
                  value: "9000"
                - name: CLICKHOUSE_DATABASE
                  value: {{ .Values.clickhouse.database | quote }}
                - name: CLICKHOUSE_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "clawd-observability.fullname" . }}-clickhouse
                      key: user
                - name: CLICKHOUSE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "clawd-observability.fullname" . }}-clickhouse
                      key: password
                - name: QDRANT_URL
                  value: "http://{{ include "clawd-observability.fullname" . }}-qdrant:6333"
                - name: EMBEDDING_MODEL
                  value: {{ .Values.auditAnalyzer.embeddingModel | quote }}
                - name: LLM_ENDPOINT
                  value: {{ .Values.auditAnalyzer.llmEndpoint | quote }}
                - name: LLM_MODEL
                  value: {{ .Values.auditAnalyzer.llmModel | quote }}
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: {{ include "clawd-observability.collector.endpoint" . }}
              resources:
                {{- toYaml .Values.auditAnalyzer.resources | nindent 16 }}
{{- end }}
