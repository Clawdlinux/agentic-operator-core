{{- if .Values.tempo.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clawd-observability.fullname" . }}-tempo-config
  namespace: {{ include "clawd-observability.namespace" . }}
  labels:
    {{- include "clawd-observability.componentLabels" (merge (dict "component" "tempo") .) | nindent 4 }}
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      max_block_duration: 5m
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
    compactor:
      compaction:
        block_retention: {{ .Values.tempo.retention }}
    query_frontend:
      search:
        max_duration: 1h
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clawd-observability.fullname" . }}-tempo
  namespace: {{ include "clawd-observability.namespace" . }}
  labels:
    {{- include "clawd-observability.componentLabels" (merge (dict "component" "tempo") .) | nindent 4 }}
spec:
  serviceName: {{ include "clawd-observability.fullname" . }}-tempo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: tempo
    spec:
      containers:
        - name: tempo
          image: {{ include "clawd-observability.image" (dict "image" .Values.tempo.image "root" .) }}
          args: ["-config.file=/conf/tempo.yaml"]
          ports:
            - containerPort: 3200
              name: http
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 9095
              name: grpc
          resources:
            {{- toYaml .Values.tempo.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /conf
            - name: data
              mountPath: /var/tempo
          readinessProbe:
            httpGet: { path: /ready, port: 3200 }
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: {{ include "clawd-observability.fullname" . }}-tempo-config
{{- if not .Values.tempo.persistence.enabled }}
        - name: data
          emptyDir: {}
{{- end }}
{{- if .Values.tempo.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
{{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
{{- end }}
        resources:
          requests:
            storage: {{ .Values.tempo.persistence.size }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawd-observability.fullname" . }}-tempo
  namespace: {{ include "clawd-observability.namespace" . }}
  labels:
    {{- include "clawd-observability.componentLabels" (merge (dict "component" "tempo") .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: tempo
  ports:
    - name: http
      port: 3200
      targetPort: http
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: grpc
      port: 9095
      targetPort: grpc
{{- end }}
