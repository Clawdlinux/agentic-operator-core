{{- /*
Only render the chart-managed Secret when the user has NOT provided an existingSecret.
Production deployments should set .Values.existingSecret to a Secret pre-created out-of-band
(e.g., via External Secrets Operator, Sealed Secrets, or kubectl create secret), so that
plaintext keys never enter `helm get values`, shell history, or the helm release Secret.
*/ -}}
{{- if not .Values.existingSecret }}
{{- if and .Values.openaiKey (not .Values.allowPlaintextKeys) }}
{{- fail "litellm.openaiKey is set as a plaintext Helm value. Use litellm.existingSecret to reference a pre-created Secret, or set litellm.allowPlaintextKeys=true to acknowledge the risk (dev/demo only)." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "litellm.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litellm.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.openaiKey | default "" | quote }}
  LITELLM_MASTER_KEY: {{ .Values.masterKey | default (randAlphaNum 32) | quote }}
{{- end }}
