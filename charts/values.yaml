# =============================================================================
# agentic-operator — Master values.yaml (Single Source of Truth)
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings (inherited by all subcharts)
# ---------------------------------------------------------------------------
global:
  # Default registry: GitHub Container Registry. Public images, no pull rate
  # limits, no cost. Aligned with the actual operator image path so
  # `<global.imageRegistry>/<repo>` resolves to a real ghcr.io image.
  # Override for air-gapped installs:
  #   --set global.imageRegistry=myregistry.local/mirror
  imageRegistry: "ghcr.io/clawdlinux/agentic-operator-core"
  # imagePullSecrets only needed for private registries. ghcr.io public images
  # do not require auth. Set to a list of Secret name STRINGS (the helper
  # template renders `- name: <string>` per item):
  #   imagePullSecrets:
  #     - my-private-registry-secret
  imagePullSecrets: []
  storageClass: ""           # Default StorageClass for PVCs
  namespace: agentic-system  # Target namespace (also rendered by namespace.yaml)

# ---------------------------------------------------------------------------
# License (REQUIRED)
# ---------------------------------------------------------------------------
license:
  key: ""           # REQUIRED — your license key
  publicKey: ""     # REQUIRED — RSA public key used to verify the license
  seats: 1          # Number of licensed concurrent agent seats (>= 1)
  tier: trial       # One of: trial | basic | pro | enterprise

# ---------------------------------------------------------------------------
# Main agentic-operator subchart
#
# NOTE: These `agenticOperator.image.*` keys are NOT currently consumed by the
# umbrella chart's templates and do NOT override the `agentic-operator`
# dependency's image settings (Helm dependency values are keyed by the subchart
# name; see charts/charts/agentic-operator/values.yaml for the values that are
# actually used). They remain here as documentation for what the operator
# subchart expects, and will be wired through in a follow-up.
# ---------------------------------------------------------------------------
agenticOperator:
  enabled: true
  replicaCount: 1
  image:
    repository: agentic-operator  # Documentation only; see subchart values
    tag: "latest"
    pullPolicy: Always  # `Always` is correct for the floating `latest` tag
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 8080
    metricsPort: 8081
  leaderElection: true
  logLevel: info
  env: {}

  # Webhook admission control (requires cert-manager)
  webhook:
    enabled: true
    createSelfSignedIssuer: true
    issuerRef:
      name: ""   # defaults to <release>-selfsigned-issuer
      kind: ClusterIssuer

  # Phase 4: Agent Evaluation Pipeline
  evaluation:
    enabled: true            # Enable quality scoring for every model call

  # Phase 5: Production Hardening
  resilience:
    retry:
      maxRetries: 3          # Max retry attempts for LLM API calls
      initialBackoffMs: 1000 # Starting backoff (1s)
      maxBackoffMs: 30000    # Cap at 30s
      jitter: true           # Randomize to prevent thundering herd
    circuitBreaker:
      failureThreshold: 5    # Open after 5 consecutive failures
      successThreshold: 2    # Close after 2 successes in half-open
      resetTimeoutMs: 60000  # Wait 60s before trying half-open
    sanitizer:
      enabled: true          # Scrub PII/secrets from logs

  # Phase 3: Model Routing
  modelRouting:
    defaultStrategy: "fixed" # "fixed" or "cost-aware"

# ---------------------------------------------------------------------------
# Cloudflare Workers AI (optional LLM provider)
# ---------------------------------------------------------------------------
cloudflareAI:
  enabled: false
  accountId: ""              # Your Cloudflare Account ID
  apiToken: ""               # API token (prefer existingSecret below)
  existingSecret: ""         # Name of existing Secret containing 'api-token' key
  defaultModel: "@cf/meta/llama-2-7b-chat-int8"

# ---------------------------------------------------------------------------
# Web UI — agentctl-web proxy (issue #134)
# Lightweight in-cluster UI that proxies agentctl operations to a browser.
# Auth: K8s TokenReview + SubjectAccessReview (RBAC-bounded).
# Default OFF in v0.3; target ON in v0.4.
# ---------------------------------------------------------------------------
webUI:
  enabled: false
  replicaCount: 1
  image:
    tag: ""                  # Defaults to Chart.AppVersion
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  service:
    type: ClusterIP
    port: 8090
  ingress:
    enabled: false
    className: ""
    host: "agentctl.example.com"
    annotations: {}
    tls: []
    #  - hosts:
    #      - agentctl.example.com
    #    secretName: agentctl-tls

# ---------------------------------------------------------------------------
# Argo Workflows
# ---------------------------------------------------------------------------
argo:
  enabled: true
  server:
    replicaCount: 1
    image:
      repository: quay.io/argoproj/argocli
      tag: v3.5.5
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    service:
      type: ClusterIP
      port: 2746
  controller:
    replicaCount: 1
    image:
      repository: quay.io/argoproj/workflow-controller
      tag: v3.5.5
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  executor:
    image:
      repository: quay.io/argoproj/argoexec
      tag: v3.5.5
  namespace: ""   # defaults to global.namespace

# ---------------------------------------------------------------------------
# Browserless (CDP pool)
# ---------------------------------------------------------------------------
browserless:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/browserless/chromium
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  service:
    type: ClusterIP
    port: 3000
  concurrentSessions: 5
  timeout: 30000       # ms
  token: ""            # optional auth token

# ---------------------------------------------------------------------------
# LiteLLM proxy
# ---------------------------------------------------------------------------
litellm:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/berriai/litellm
    tag: main-latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 4000
  openaiKey: ""     # REQUIRED when litellm.enabled=true (dev only -- prefer existingSecret)
  masterKey: ""     # LiteLLM master API key (leave blank to auto-generate)
  # PRODUCTION: set existingSecret to the name of a pre-created Secret containing
  # OPENAI_API_KEY and LITELLM_MASTER_KEY. When set, openaiKey/masterKey are ignored
  # and the chart will NOT create a Secret -- keys never enter Helm values or release Secret.
  existingSecret: ""
  # Setting allowPlaintextKeys=true acknowledges the risk of providing openaiKey or masterKey
  # via Helm values. Required for chart install when either key is non-empty and
  # existingSecret is unset.
  allowPlaintextKeys: false
  models: []        # Extra model definitions passed to config.yaml
  # Example:
  # models:
  #   - model_name: gpt-4o
  #     litellm_params:
  #       model: openai/gpt-4o
  #       api_key: "os.environ/OPENAI_API_KEY"

# ---------------------------------------------------------------------------
# MinIO (Object storage)
# ---------------------------------------------------------------------------
minio:
  enabled: true
  replicaCount: 1
  image:
    repository: minio/minio
    tag: RELEASE.2024-06-13T22-53-53Z
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    type: ClusterIP
    port: 9000
    consolePort: 9001
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  rootUser: ""     # auto-generated if left empty
  rootPassword: ""   # auto-generated if left empty
  defaultBuckets: "agent-artifacts,agent-logs"

# ---------------------------------------------------------------------------
# PostgreSQL (Durable state)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  replicaCount: 1
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  auth:
    database: agentdb
    username: agentuser
    password: ""   # auto-generated if left empty
    postgresPassword: ""   # auto-generated if left empty

# ---------------------------------------------------------------------------
# Ingress (optional — routes to relevant services)
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: agentic-operator.local
      paths:
        - path: /
          pathType: Prefix
          service: agentic-operator
          port: 8080
    - host: argo.agentic-operator.local
      paths:
        - path: /
          pathType: Prefix
          service: argo-server
          port: 2746
    - host: litellm.agentic-operator.local
      paths:
        - path: /
          pathType: Prefix
          service: litellm
          port: 4000
  tls: []
  # tls:
  #   - secretName: agentic-operator-tls
  #     hosts:
  #       - agentic-operator.local
