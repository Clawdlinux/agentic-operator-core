# =============================================================================
# agentic-operator — Master values.yaml (Single Source of Truth)
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings (inherited by all subcharts)
# ---------------------------------------------------------------------------
global:
  imageRegistry: "registry.digitalocean.com/agentic-operator"  # DigitalOcean Container Registry
  imagePullSecrets: 
    - name: do-registry-secret # Kubernetes secret with DO registry credentials
  storageClass: ""           # Default StorageClass for PVCs
  namespace: agentic-system  # Target namespace (also rendered by namespace.yaml)

# ---------------------------------------------------------------------------
# License (REQUIRED)
# ---------------------------------------------------------------------------
license:
  key: ""           # REQUIRED — your license key
  publicKey: ""     # REQUIRED — RSA public key used to verify the license
  seats: 1          # Number of licensed concurrent agent seats (>= 1)
  tier: trial       # One of: trial | basic | pro | enterprise

# ---------------------------------------------------------------------------
# Security posture (sensitive-by-default)
#
# These controls exist to make the April 2026 Vercel / Context.ai breach class
# structurally impossible in NineVigil. See docs/security/threat-model.md.
#
# Defaults are deliberately strict. Loosening any value below widens the blast
# radius of a compromised tool, model, or operator credential — do it only
# with an explicit risk acceptance.
# ---------------------------------------------------------------------------
security:
  secrets:
    # When true (default), the chart refuses to render if any subchart has a
    # plaintext credential in values. Callers must supply `existingSecret`
    # instead. This mirrors the AgentWorkload validating webhook, which
    # rejects plaintext credentials in CR specs.
    requireExistingSecret: true
  egress:
    # When true (default), every agent namespace gets a default-deny
    # CiliumNetworkPolicy that only allows traffic to the LiteLLM proxy,
    # kube-dns, and the operator's own metrics endpoint. External FQDNs
    # must be added via the FQDNAllowlist CRD, not inline on pod specs.
    strictMode: true
    # Additional FQDNs the agent namespace is allowed to reach. Each entry
    # is a Cilium matchPattern / matchName. Keep this list short; prefer
    # routing traffic through LiteLLM so model endpoints are centrally
    # allowlisted and audit-logged.
    allowedFQDNs: []
    # When true, refuse to render if any pod in the chart has unrestricted
    # egress (missing CiliumNetworkPolicy / NetworkPolicy selector).
    enforceOnRender: true
  podSecurity:
    # Kubernetes Pod Security Admission level for agent namespaces.
    # "restricted" is the default: no hostPath, no hostNetwork, no
    # privilege escalation, dropped capabilities, read-only rootfs.
    # MCP servers — which the operator treats as untrusted — run here.
    enforce: restricted
    audit: restricted
    warn: restricted
  audit:
    # Append-only audit sink. When enabled, every agent action, tool call,
    # LLM request, and secret access is forwarded to the configured sink.
    # Dwell time in NineVigil is bounded by this retention, not by
    # third-party OAuth app discovery.
    #
    # NOTE: Actual wiring lives under the `agentic-operator:` subchart
    # block below — this entry is the documented user-facing knob and the
    # value the render-time assertions read. Keep the two in sync when
    # changing defaults.
    enabled: true
    # Sink type: "loki" | "vector" | "stdout" (dev only).
    sink: stdout
    # For loki: endpoint of a Loki instance with retention configured.
    lokiEndpoint: ""
    # For vector: a Secret containing a Vector config with append-only
    # SIEM forwarding. The operator mounts this into its own pod.
    vectorConfigSecret: ""
  # External OAuth to third-party SaaS (Google Workspace, Slack, GitHub, etc.)
  # is deliberately disabled. No component in agentic-operator-core performs
  # OAuth against an external SaaS on behalf of the cluster operator. The
  # flag exists so that downstream operators who add such integrations in
  # a fork must opt in explicitly and can be audited grep-side.
  experimental:
    externalOAuth: false

# ---------------------------------------------------------------------------
# Main agentic-operator subchart
# ---------------------------------------------------------------------------
agenticOperator:
  enabled: true
  replicaCount: 1
  image:
    repository: agentic-operator  # Pulls from global.imageRegistry (DigitalOcean)
    tag: "latest"
    pullPolicy: Always  # Always pull to get latest from DO registry
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 8080
    metricsPort: 8081
  leaderElection: true
  logLevel: info
  env: {}

  # Webhook admission control (requires cert-manager)
  webhook:
    enabled: true
    createSelfSignedIssuer: true
    issuerRef:
      name: ""   # defaults to <release>-selfsigned-issuer
      kind: ClusterIssuer

  # Phase 4: Agent Evaluation Pipeline
  evaluation:
    enabled: true            # Enable quality scoring for every model call

  # Phase 5: Production Hardening
  resilience:
    retry:
      maxRetries: 3          # Max retry attempts for LLM API calls
      initialBackoffMs: 1000 # Starting backoff (1s)
      maxBackoffMs: 30000    # Cap at 30s
      jitter: true           # Randomize to prevent thundering herd
    circuitBreaker:
      failureThreshold: 5    # Open after 5 consecutive failures
      successThreshold: 2    # Close after 2 successes in half-open
      resetTimeoutMs: 60000  # Wait 60s before trying half-open
    sanitizer:
      enabled: true          # Scrub PII/secrets from logs

  # Phase 3: Model Routing
  modelRouting:
    defaultStrategy: "fixed" # "fixed" or "cost-aware"

# Subchart overrides — values under this key flow into the `agentic-operator`
# subchart (Chart.yaml dependency name). Keep audit.* in sync with
# security.audit.* above.
agentic-operator:
  audit:
    enabled: true
    sink: stdout
    lokiEndpoint: ""
    vectorConfigSecret: ""

# ---------------------------------------------------------------------------
# Cloudflare Workers AI (optional LLM provider)
# ---------------------------------------------------------------------------
cloudflareAI:
  enabled: false
  accountId: ""              # Your Cloudflare Account ID
  # API token MUST come from an existing Secret when
  # security.secrets.requireExistingSecret is true (the default). Inline
  # apiToken values are rejected at render-time.
  apiToken: ""
  existingSecret: ""         # Name of existing Secret containing 'api-token' key
  defaultModel: "@cf/meta/llama-2-7b-chat-int8"

# ---------------------------------------------------------------------------
# Argo Workflows
# ---------------------------------------------------------------------------
argo:
  enabled: true
  server:
    replicaCount: 1
    image:
      repository: quay.io/argoproj/argocli
      tag: v3.5.5
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    service:
      type: ClusterIP
      port: 2746
  controller:
    replicaCount: 1
    image:
      repository: quay.io/argoproj/workflow-controller
      tag: v3.5.5
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  executor:
    image:
      repository: quay.io/argoproj/argoexec
      tag: v3.5.5
  namespace: ""   # defaults to global.namespace

# ---------------------------------------------------------------------------
# Browserless (CDP pool)
# ---------------------------------------------------------------------------
browserless:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/browserless/chromium
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  service:
    type: ClusterIP
    port: 3000
  concurrentSessions: 5
  timeout: 30000       # ms
  # Auth token. Leave `token` empty and set `existingSecret` to the name of
  # a pre-created Kubernetes Secret with key `token`. Passing the token
  # inline is rejected when security.secrets.requireExistingSecret is true.
  token: ""
  existingSecret: ""

# ---------------------------------------------------------------------------
# LiteLLM proxy
# ---------------------------------------------------------------------------
litellm:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/berriai/litellm
    tag: main-latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 4000
  # LLM provider credentials. With security.secrets.requireExistingSecret=true
  # (default), openaiKey and masterKey MUST come from a pre-created Secret.
  # Set `existingSecret` to the Secret name and provide keys `OPENAI_API_KEY`
  # and `LITELLM_MASTER_KEY`.
  openaiKey: ""
  masterKey: ""
  existingSecret: ""
  models: []        # Extra model definitions passed to config.yaml
  # Example:
  # models:
  #   - model_name: gpt-4o
  #     litellm_params:
  #       model: openai/gpt-4o
  #       api_key: "os.environ/OPENAI_API_KEY"

# ---------------------------------------------------------------------------
# MinIO (Object storage)
# ---------------------------------------------------------------------------
minio:
  enabled: true
  replicaCount: 1
  image:
    repository: minio/minio
    tag: RELEASE.2024-06-13T22-53-53Z
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    type: ClusterIP
    port: 9000
    consolePort: 9001
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  # Root credentials. Leave blank to auto-generate (sealed — the chart creates
  # a Secret with random values). To BYO, set `existingSecret` to a Secret
  # with keys `rootUser` and `rootPassword`. Plaintext values here are
  # rejected when security.secrets.requireExistingSecret is true.
  rootUser: ""
  rootPassword: ""
  existingSecret: ""
  defaultBuckets: "agent-artifacts,agent-logs"

# ---------------------------------------------------------------------------
# PostgreSQL (Durable state)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  replicaCount: 1
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  auth:
    database: agentdb
    username: agentuser
    # Leave both passwords blank to auto-generate (sealed). To BYO, set
    # `existingSecret` to a Secret with keys `password` and `postgresPassword`.
    # Plaintext values here are rejected when
    # security.secrets.requireExistingSecret is true.
    password: ""
    postgresPassword: ""
    existingSecret: ""

# ---------------------------------------------------------------------------
# Ingress (optional — routes to relevant services)
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: agentic-operator.local
      paths:
        - path: /
          pathType: Prefix
          service: agentic-operator
          port: 8080
    - host: argo.agentic-operator.local
      paths:
        - path: /
          pathType: Prefix
          service: argo-server
          port: 2746
    - host: litellm.agentic-operator.local
      paths:
        - path: /
          pathType: Prefix
          service: litellm
          port: 4000
  tls: []
  # tls:
  #   - secretName: agentic-operator-tls
  #     hosts:
  #       - agentic-operator.local
