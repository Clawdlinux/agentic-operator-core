# EDIT THIS FILE to change the successful analysis objective.
# TEMPLATE ONLY. demo-booth.sh injects live ANF and clears the annotation.
apiVersion: agentic.clawdlinux.org/v1alpha1
kind: AgentWorkload
metadata:
  name: booth-success-analysis
  labels:
    app.kubernetes.io/part-of: clawdlinux-booth-demo
    demo.clawdlinux.org/scenario: success
  annotations:
    demo.clawdlinux.org/template: "true"
    demo.clawdlinux.org/provider-proof: "Live ANF context is routed through in-cluster LiteLLM to Claude Haiku 4.5."
spec:
  objective: |
    Review the successful Kubernetes fixture in this live Agent Native Format.
    Explain the evidence that proves success and list 3 controls a regulated
    platform team should retain before promoting this workload. Do not invent
    missing telemetry or claim runtime enforcement that is not in the evidence.
    BEGIN ANF CONTEXT
    ANF_CONTEXT_INSERT_HERE
    END ANF CONTEXT
  workloadType: kubernetes
  agents:
    - platform-evidence-reviewer
  collaborationMode: solo
  opaPolicy: strict
  autoApproveThreshold: "0.95"
  modelStrategy: cost-aware
  taskClassifier: default
  providers:
    - name: litellm
      type: openai-compatible
      endpoint: http://clawdlinux-demo-litellm.agentic-system.svc.cluster.local:4000/v1
      apiKeySecret:
        name: clawdlinux-demo-litellm
        key: api-key
  modelMapping:
    validation: litellm/clawdlinux-anthropic
    analysis: litellm/clawdlinux-anthropic
    reasoning: litellm/clawdlinux-anthropic
  timeouts:
    execution: 180
