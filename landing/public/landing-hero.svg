<svg viewBox="0 0 1200 600" width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="hero-clip"><rect width="1200" height="600"/></clipPath>
  </defs>
  <g clip-path="url(#hero-clip)">
    <!-- Background -->
    <rect width="1200" height="600" fill="#0F1B3D"/>

    <!-- Animated-style mesh network background -->
    <g opacity="0.12">
      <!-- Horizontal lines -->
      <line x1="0" y1="100" x2="1200" y2="100" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="0" y1="200" x2="1200" y2="200" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="0" y1="300" x2="1200" y2="300" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="0" y1="400" x2="1200" y2="400" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="0" y1="500" x2="1200" y2="500" stroke="#3B82F6" stroke-width="0.5"/>
      <!-- Vertical lines -->
      <line x1="200" y1="0" x2="200" y2="600" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="400" y1="0" x2="400" y2="600" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="600" y1="0" x2="600" y2="600" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="800" y1="0" x2="800" y2="600" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="1000" y1="0" x2="1000" y2="600" stroke="#3B82F6" stroke-width="0.5"/>
    </g>

    <!-- Agent mesh visualization (right side) -->
    <g transform="translate(880, 280)">
      <!-- Central hub -->
      <circle cx="0" cy="0" r="40" fill="#1E2761" stroke="#3B82F6" stroke-width="2"/>
      <text x="0" y="6" font-family="Arial Black, Arial" font-weight="900" font-size="36" fill="#CADCFC" text-anchor="middle">9</text>

      <!-- Agent nodes -->
      <g>
        <!-- Top agent -->
        <line x1="0" y1="-40" x2="0" y2="-110" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
        <circle cx="0" cy="-130" r="20" fill="#1E2761" stroke="#60A5FA" stroke-width="1.5"/>
        <text x="0" y="5" font-family="monospace" font-size="11" fill="#60A5FA" text-anchor="middle" transform="translate(0,-130)">A1</text>

        <!-- Top-right agent -->
        <line x1="28" y1="-28" x2="85" y2="-85" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
        <circle cx="100" cy="-100" r="20" fill="#1E2761" stroke="#60A5FA" stroke-width="1.5"/>
        <text x="0" y="5" font-family="monospace" font-size="11" fill="#60A5FA" text-anchor="middle" transform="translate(100,-100)">A2</text>

        <!-- Right agent -->
        <line x1="40" y1="0" x2="110" y2="0" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
        <circle cx="130" cy="0" r="20" fill="#1E2761" stroke="#10B981" stroke-width="1.5"/>
        <text x="0" y="5" font-family="monospace" font-size="11" fill="#10B981" text-anchor="middle" transform="translate(130,0)">A3</text>

        <!-- Bottom-right agent -->
        <line x1="28" y1="28" x2="85" y2="85" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
        <circle cx="100" cy="100" r="20" fill="#1E2761" stroke="#60A5FA" stroke-width="1.5"/>
        <text x="0" y="5" font-family="monospace" font-size="11" fill="#60A5FA" text-anchor="middle" transform="translate(100,100)">A4</text>

        <!-- Bottom agent -->
        <line x1="0" y1="40" x2="0" y2="110" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
        <circle cx="0" cy="130" r="20" fill="#1E2761" stroke="#F59E0B" stroke-width="1.5"/>
        <text x="0" y="5" font-family="monospace" font-size="11" fill="#F59E0B" text-anchor="middle" transform="translate(0,130)">A5</text>

        <!-- Left agent -->
        <line x1="-40" y1="0" x2="-90" y2="0" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
        <circle cx="-110" cy="0" r="20" fill="#1E2761" stroke="#60A5FA" stroke-width="1.5"/>
        <text x="0" y="5" font-family="monospace" font-size="11" fill="#60A5FA" text-anchor="middle" transform="translate(-110,0)">A6</text>

        <!-- Inter-agent connections -->
        <line x1="0" y1="-130" x2="100" y2="-100" stroke="#3B82F6" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,4"/>
        <line x1="100" y1="-100" x2="130" y2="0" stroke="#3B82F6" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,4"/>
        <line x1="130" y1="0" x2="100" y2="100" stroke="#3B82F6" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,4"/>
        <line x1="100" y1="100" x2="0" y2="130" stroke="#3B82F6" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,4"/>
        <line x1="0" y1="130" x2="-110" y2="0" stroke="#3B82F6" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,4"/>
        <line x1="-110" y1="0" x2="0" y2="-130" stroke="#3B82F6" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,4"/>
      </g>

      <!-- Status labels -->
      <rect x="135" y="-15" width="60" height="18" rx="9" fill="#10B981" opacity="0.2"/>
      <text x="165" y="-2" font-family="monospace" font-size="9" fill="#10B981" text-anchor="middle">ACTIVE</text>

      <rect x="-20" y="148" width="60" height="18" rx="9" fill="#F59E0B" opacity="0.2"/>
      <text x="10" y="161" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle">REVIEW</text>
    </g>

    <!-- ClawdLinux logo (left, integrated) -->
    <g transform="translate(100, 120) scale(0.9)">
      <path d="M-8,-55 C-8,-55 -30,-30 -40,0 C-50,30 -35,55 -10,55 C5,55 15,45 20,35 C25,25 30,10 25,-5 C20,-20 10,-35 5,-45 C2,-50 -2,-55 -8,-55Z" fill="#CADCFC" opacity="0.7"/>
      <path d="M-25,-15 L15,25" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
      <path d="M-15,-20 L22,15" stroke="#3B82F6" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
      <path d="M-5,-25 L28,5" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
      <circle cx="30" cy="-35" r="3" fill="#60A5FA" opacity="0.7"/>
      <circle cx="35" cy="-28" r="2" fill="#3B82F6" opacity="0.6"/>
    </g>

    <!-- Main text content (left side) -->
    <text x="80" y="230" font-family="Arial Black, Arial" font-weight="900" font-size="56" fill="#FFFFFF" letter-spacing="-1">NineVigil</text>

    <text x="80" y="290" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#60A5FA" letter-spacing="0.5">The Agentic Service Mesh</text>
    <text x="80" y="325" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#94A3B8">for Enterprise Kubernetes</text>

    <!-- Feature pills -->
    <g transform="translate(80, 370)">
      <rect x="0" y="0" width="170" height="32" rx="16" fill="#3B82F6" opacity="0.15"/>
      <text x="85" y="21" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#60A5FA" text-anchor="middle" font-weight="bold">Agent orchestration</text>

      <rect x="185" y="0" width="130" height="32" rx="16" fill="#3B82F6" opacity="0.15"/>
      <text x="250" y="21" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#60A5FA" text-anchor="middle" font-weight="bold">RL feedback</text>

      <rect x="330" y="0" width="120" height="32" rx="16" fill="#3B82F6" opacity="0.15"/>
      <text x="390" y="21" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#60A5FA" text-anchor="middle" font-weight="bold">Air-gapped</text>
    </g>

    <!-- Terminal snippet -->
    <g transform="translate(80, 440)">
      <rect x="0" y="0" width="420" height="100" rx="8" fill="#1E2761" stroke="#2D3A6D" stroke-width="1"/>
      <!-- Terminal dots -->
      <circle cx="16" cy="16" r="4" fill="#EF4444" opacity="0.8"/>
      <circle cx="30" cy="16" r="4" fill="#F59E0B" opacity="0.8"/>
      <circle cx="44" cy="16" r="4" fill="#10B981" opacity="0.8"/>
      <!-- Commands -->
      <text x="16" y="48" font-family="monospace" font-size="13" fill="#10B981">$ agentctl init</text>
      <text x="16" y="68" font-family="monospace" font-size="13" fill="#94A3B8">  Mesh CRDs installed</text>
      <text x="16" y="88" font-family="monospace" font-size="13" fill="#10B981">$ agentctl apply -f swarm.yaml</text>
    </g>
  </g>
</svg>
