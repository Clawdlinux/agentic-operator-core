name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  go-verify:
    name: Go Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Download nested ANF snapshot modules
        working-directory: tools/anf-snapshot
        run: go mod download

      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Verify nested ANF snapshot go.mod/go.sum are tidy
        working-directory: tools/anf-snapshot
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run canonical lint
        run: make lint

      - name: Run nested ANF snapshot vet
        run: make vet-anf-snapshot

      - name: Install envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          mkdir -p ./bin
          "$(go env GOPATH)/bin/setup-envtest" use latest --bin-dir ./bin -p path

      - name: Run Go tests
        run: go test ./api/... ./pkg/... ./internal/... -count=1

      - name: Run nested ANF snapshot tests
        run: make test-anf-snapshot GO_TEST_FLAGS="-count=1"
