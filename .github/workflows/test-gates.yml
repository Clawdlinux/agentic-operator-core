name: Test Gates

on:
  pull_request:
    paths:
      - "Makefile"
      - "internal/controller/**"
      - "pkg/**"
      - "api/**"
      - "cmd/**"
      - "agents/**"
      - "charts/**"
      - "scripts/**"
      - "tests/smoke/**"
      - "examples/**"
      - ".github/workflows/test-gates.yml"
  push:
    branches:
      - main
    paths:
      - "Makefile"
      - "internal/controller/**"
      - "pkg/**"
      - "api/**"
      - "cmd/**"
      - "agents/**"
      - "charts/**"
      - "scripts/**"
      - "tests/smoke/**"
      - "examples/**"
      - ".github/workflows/test-gates.yml"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  test-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Quick secret scan
        run: make scan-secrets

      - name: Run booth CLI smoke tests
        run: bash tests/smoke/test_demo_booth_cli.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check Go formatting
        run: make fmt-check

      - name: Run Go lint checks
        run: make lint

      - name: Run controller envtest suite
        run: make test-controller GO_TEST_FLAGS="-count=1 -v -timeout 180s"

      - name: Run Go tests
        run: make test-go

      - name: Install helm-unittest plugin
        run: |
          # Build the plugin from an immutable source commit. Do not run its
          # installer hook, which downloads a mutable release asset.
          plugin_dir="${RUNNER_TEMP}/helm-unittest"
          git clone --filter=blob:none https://github.com/helm-unittest/helm-unittest.git "${plugin_dir}"
          git -C "${plugin_dir}" checkout --detach 9cf59a78dbb89f3e3c70c62d2570cd7e96b97845
          test "$(git -C "${plugin_dir}" rev-parse HEAD)" = "9cf59a78dbb89f3e3c70c62d2570cd7e96b97845"
          (
            cd "${plugin_dir}"
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 GOTOOLCHAIN=go1.26.0 \
              go build -trimpath -buildvcs=false -o untt-linux-amd64 \
              -ldflags "-X github.com/helm-unittest/helm-unittest/internal/build.version=1.1.1 -extldflags '-static'" \
              ./cmd/helm-unittest
          )
          helm_plugins="$(helm env | sed -n 's/^HELM_PLUGINS="\(.*\)"$/\1/p')"
          test -n "${helm_plugins}"
          install_dir="${helm_plugins}/unittest"
          mkdir -p "${install_dir}"
          install -m 0755 "${plugin_dir}/untt-linux-amd64" "${install_dir}/untt-linux-amd64"
          install -m 0644 "${plugin_dir}/plugin.yaml" "${install_dir}/plugin.yaml"
          helm plugin list | grep -Eq '^unittest[[:space:]]+1\.1\.1([[:space:]]|$)'

      - name: Run Helm unit tests
        run: helm unittest charts

      - name: Lint Helm chart
        run: make helm-lint
